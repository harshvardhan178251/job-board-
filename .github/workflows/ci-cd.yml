name: CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vercel.json'
  pull_request:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vercel.json'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, test, and validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      NODE_ENV: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Build frontend app
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          if-no-files-found: error

      - name: Verify backend health endpoint
        run: |
          npm --prefix backend run start > /tmp/talentflow-backend.log 2>&1 &
          pid=$!
          for attempt in {1..25}; do
            if curl -fsS http://127.0.0.1:5001/api/health >/dev/null 2>&1; then
              kill $pid || true
              exit 0
            fi
            sleep 2
          done
          kill $pid || true
          echo "Backend failed to start correctly." 
          cat /tmp/talentflow-backend.log
          exit 1

      - name: Show workflow summary
        if: always()
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend build completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- Backend health check completed successfully" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy to Vercel
    needs: build-and-test
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            # Deploy the prebuilt build/dist assets folder directly to production
            vercel deploy --prod --token="$VERCEL_TOKEN" --yes
          else
            echo "Skipping deployment because Vercel secrets are not configured correctly in GitHub Settings."
            exit 1
          fi