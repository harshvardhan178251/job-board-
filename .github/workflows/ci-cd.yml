name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root deps
        run: npm install
      - name: Install frontend deps
        run: npm --prefix frontend install
      - name: Install backend deps
        run: npm --prefix backend install
      - name: Build frontend
        run: npm run build
      - name: Verify backend starts
        run: |
          npm --prefix backend run start > /tmp/talentflow-backend.log 2>&1 &
          pid=$!
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:5001/api/health >/dev/null 2>&1; then
              kill $pid
              exit 0
            fi
            sleep 1
          done
          kill $pid || true
          cat /tmp/talentflow-backend.log
          exit 1
